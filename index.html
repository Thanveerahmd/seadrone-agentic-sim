<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeaDrone Multi-Agent Sim</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { background: #080c12; color: #c0d0e0; font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; }
      ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #0a1018; } ::-webkit-scrollbar-thumb { background: #1a2a3a; border-radius: 2px; }
      @keyframes pulse { 0%, 100% { box-shadow: 0 0 8px #ff444440; } 50% { box-shadow: 0 0 20px #ff444480; } }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
